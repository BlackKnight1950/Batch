services:
  - type: web
    name: staffing-intake-console
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: SMARTSHEET_TOKEN
        sync: false
      - key: SHEET_ID
        value: "8431524360703876"
      - key: ACCESS_CODE
        sync: false
